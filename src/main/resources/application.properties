spring.datasource.url=

spring.datasource.username=

spring.datasource.password=

spring.datasource.driver-class-name=
spring.jpa.hibernate.ddl-auto=

spring.jpa.show-sql=

spring.jpa.properties.hibernate.format_sql=

# Cloudinary Configuration
cloudinary.cloud-name=
cloudinary.api-key=
cloudinary.api-secret=
# Gi?i h?n upload file (Spring Boot 3.x)
spring.servlet.multipart.max-file-size=
spring.servlet.multipart.max-request-size=

# Email Configuration
spring.mail.host=
spring.mail.port=
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=
spring.mail.properties.mail.smtp.starttls.enable=

# Studio Working Schedule - Khung giờ làm việc của Studio
# Định dạng: HH:mm (phân cách bằng dấu phẩy)
# Để thay đổi giờ làm việc, chỉ cần sửa dòng này và restart ứng dụng
studio.schedule.time-slots=

# JWT Configuration - Cấu hình khóa bí mật và thời hạn Token (1 ngày)
jwt.secret=
jwt.expiration=

# Jackson Configuration to handle Hibernate Lazy Loading proxy serialization issues
spring.jackson.serialization.fail-on-empty-beans=